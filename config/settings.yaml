app:
  name: "CloudDash Support System"
  version: "0.1.0"

llm:
  provider: "ollama"
  model: "gemma4:31b-cloud"
  base_url: "https://ollama.com"
  temperature: 1.0
  top_p: 0.95
  top_k: 64
  max_tokens: 2048
  timeout_seconds: 30

retrieval:
  top_k: 3
  score_threshold: 0.4
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: "all-MiniLM-L6-v2"

chromadb:
  persist_directory: "./data/chromadb"
  collection_name: "clouddash_kb"

logging:
  level: "INFO"
  format: "json"
  include_trace_id: true

guardrails:
  max_input_length: 2000
  injection_patterns:
    - "ignore previous instructions"
    - "ignore all instructions"
    - "you are now"
    - "pretend you are"
    - "act as if"
    - "DAN mode"
    - "jailbreak"
    - "disregard your"

routing:
  max_handovers: 3
  fallback_agent: "escalation"
  error_threshold: 2
